<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#fef3c7"/>

  <!-- Floor -->
  <rect y="480" width="800" height="120" fill="#fbbf24" opacity="0.2"/>

  <!-- Kitchen cabinets -->
  <rect x="500" y="200" width="250" height="280" fill="#1e40af" stroke="#1e3a8a" stroke-width="4" rx="8"/>
  <rect x="500" y="180" width="250" height="30" fill="#cbd5e1" rx="4"/>

  <!-- Cabinet doors -->
  <rect x="515" y="220" width="105" height="120" fill="#1e3a8a" stroke="#0f172a" stroke-width="2" rx="4"/>
  <rect x="630" y="220" width="105" height="120" fill="#1e3a8a" stroke="#0f172a" stroke-width="2" rx="4"/>
  <circle cx="605" cy="280" r="6" fill="#cbd5e1"/>
  <circle cx="645" cy="280" r="6" fill="#cbd5e1"/>

  <!-- Lower cabinets/drawers -->
  <rect x="515" y="360" width="105" height="110" fill="#1e3a8a" stroke="#0f172a" stroke-width="2" rx="4"/>
  <rect x="630" y="360" width="105" height="110" fill="#1e3a8a" stroke="#0f172a" stroke-width="2" rx="4"/>
  <line x1="520" y1="405" x2="615" y2="405" stroke="#0f172a" stroke-width="2"/>
  <line x1="635" y1="405" x2="730" y2="405" stroke="#0f172a" stroke-width="2"/>

  <!-- Countertop -->
  <rect x="490" y="470" width="280" height="20" fill="#94a3b8" rx="4"/>

  <!-- Cleaner figure -->
  <circle cx="320" cy="350" r="55" fill="#fb923c"/>
  <rect x="265" y="405" width="110" height="150" fill="#1e40af" rx="12"/>

  <!-- Arms cleaning -->
  <rect x="360" y="440" width="80" height="15" fill="#3b82f6" rx="7"/>
  <ellipse cx="450" cy="447" rx="25" ry="20" fill="#fef3c7"/>

  <!-- Cleaning spray bottle in hand -->
  <rect x="435" y="435" width="25" height="45" fill="#60a5fa" rx="4"/>
  <rect x="440" y="425" width="15" height="15" fill="#3b82f6" rx="3"/>

  <!-- Cleaning cloth/sponge -->
  <rect x="200" y="450" width="60" height="40" fill="#fbbf24" rx="8"/>

  <!-- Bucket on floor -->
  <ellipse cx="150" cy="520" rx="50" ry="20" fill="#1e40af"/>
  <path d="M 100 520 Q 125 450 150 450 Q 175 450 200 520" fill="#3b82f6" stroke="#1e40af" stroke-width="2"/>

  <!-- Sparkles indicating clean surfaces -->
  <circle cx="550" cy="250" r="7" fill="#fbbf24"/>
  <circle cx="600" cy="230" r="6" fill="#fbbf24"/>
  <circle cx="680" cy="270" r="8" fill="#fbbf24"/>
  <circle cx="650" cy="300" r="6" fill="#fbbf24"/>
  <circle cx="720" cy="240" r="7" fill="#fbbf24"/>

  <!-- Shine effect on cabinet -->
  <path d="M 530 240 Q 560 250 540 270" fill="none" stroke="#60a5fa" stroke-width="3" opacity="0.5"/>
  <path d="M 660 250 Q 690 260 670 280" fill="none" stroke="#60a5fa" stroke-width="3" opacity="0.5"/>

  <!-- Label -->
  <text x="400" y="580" font-family="Arial, sans-serif" font-size="26" fill="#1e40af" text-anchor="middle" font-weight="bold">Professional Kitchen Cleaning</text>
</svg>
