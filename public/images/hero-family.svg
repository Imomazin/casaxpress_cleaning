<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="800" fill="#f0f9ff"/>

  <!-- Window frame -->
  <rect x="100" y="100" width="400" height="600" fill="#e0f2fe" stroke="#3b82f6" stroke-width="8" rx="10"/>

  <!-- Sofa -->
  <rect x="600" y="500" width="500" height="250" fill="#1e40af" rx="20"/>
  <rect x="580" y="520" width="100" height="200" fill="#1e3a8a" rx="10"/>
  <rect x="1020" y="520" width="100" height="200" fill="#1e3a8a" rx="10"/>

  <!-- People silhouettes on sofa -->
  <circle cx="700" cy="580" r="50" fill="#60a5fa"/>
  <rect x="650" y="630" width="100" height="120" fill="#3b82f6" rx="10"/>

  <circle cx="880" cy="580" r="50" fill="#60a5fa"/>
  <rect x="830" y="630" width="100" height="120" fill="#3b82f6" rx="10"/>

  <circle cx="1000" cy="600" r="35" fill="#93c5fd"/>
  <rect x="965" y="635" width="70" height="90" fill="#60a5fa" rx="8"/>

  <!-- Decorative elements -->
  <circle cx="200" cy="200" r="80" fill="#fbbf24" opacity="0.3"/>
  <circle cx="350" cy="350" r="60" fill="#34d399" opacity="0.3"/>

  <!-- Text -->
  <text x="600" y="100" font-family="Arial, sans-serif" font-size="48" fill="#1e40af" font-weight="bold">Happy Family at Home</text>
</svg>
