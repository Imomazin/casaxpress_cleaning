<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#f0f9ff"/>

  <!-- Floor -->
  <rect y="400" width="800" height="200" fill="#dbeafe"/>

  <!-- Table -->
  <ellipse cx="400" cy="420" rx="250" ry="40" fill="#94a3b8"/>
  <rect x="150" y="280" width="500" height="140" fill="#cbd5e1" rx="10"/>

  <!-- Cleaning supplies on table -->
  <!-- Spray bottle -->
  <rect x="250" y="250" width="60" height="140" fill="#3b82f6" rx="8"/>
  <rect x="260" y="230" width="40" height="30" fill="#60a5fa" rx="5"/>
  <path d="M 270 230 L 280 210 L 290 230" fill="none" stroke="#60a5fa" stroke-width="3"/>

  <!-- Sponge -->
  <rect x="350" y="270" width="80" height="60" fill="#fbbf24" rx="15"/>
  <rect x="360" y="280" width="60" height="40" fill="#f59e0b" rx="10"/>

  <!-- Cloth -->
  <ellipse cx="500" cy="300" rx="70" ry="50" fill="#a3e635"/>
  <ellipse cx="505" cy="305" rx="50" ry="35" fill="#84cc16"/>

  <!-- Bucket -->
  <ellipse cx="620" cy="340" rx="70" ry="20" fill="#1e40af"/>
  <path d="M 550 340 Q 585 240 620 240 Q 655 240 690 340" fill="#3b82f6" stroke="#1e40af" stroke-width="3"/>

  <!-- Sparkles -->
  <circle cx="200" cy="150" r="8" fill="#fbbf24"/>
  <circle cx="250" cy="100" r="6" fill="#fbbf24"/>
  <circle cx="300" cy="120" r="7" fill="#fbbf24"/>
  <circle cx="600" cy="180" r="8" fill="#fbbf24"/>
  <circle cx="650" cy="140" r="6" fill="#fbbf24"/>
  <circle cx="550" cy="160" r="7" fill="#fbbf24"/>

  <!-- Title text -->
  <text x="400" y="550" font-family="Arial, sans-serif" font-size="36" fill="#1e40af" text-anchor="middle" font-weight="bold">Professional Cleaning Service</text>
</svg>
